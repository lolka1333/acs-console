name: build-dropbear-mips
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install host build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential wget bzip2 file git make rsync texinfo

      - name: Build mips32(r1) soft-float musl toolchain + static dropbear
        run: |
          set -e
          # matched cross toolchain: MIPS32 r1, SOFT-float, o32, big-endian, musl
          git clone --depth 1 https://github.com/richfelker/musl-cross-make
          cd musl-cross-make
          printf 'TARGET = mips-linux-muslsf\nGCC_CONFIG += --with-arch=mips32 --enable-languages=c --disable-multilib\n' > config.mak
          # GNU mirrors occasionally return 502; retry so wget -c resumes the missing source tarballs
          ok=0
          for i in 1 2 3 4 5 6; do
            if make -j"$(nproc)"; then ok=1; break; fi
            echo "::warning::toolchain build attempt $i failed (likely a transient mirror 502) - retrying"
            sleep 15
          done
          [ "$ok" = 1 ] || { echo "toolchain build failed after retries"; exit 1; }
          make install
          export PATH="$PWD/output/bin:$PATH"
          echo "toolchain: $(mips-linux-muslsf-gcc -dumpmachine)"
          cd ..
          # final static dropbear: key-only AND no login records (no utmp/wtmp/lastlog traces)
          wget -q https://matt.ucc.asn.au/dropbear/releases/dropbear-2022.83.tar.bz2
          tar xjf dropbear-2022.83.tar.bz2
          cd dropbear-2022.83
          {
            echo '#define DROPBEAR_SVR_PASSWORD_AUTH 0'
            echo '#define DROPBEAR_SVR_PUBKEY_AUTH 1'
            echo '#define DROPBEAR_UTMP 0'
            echo '#define DROPBEAR_WTMP 0'
            echo '#define DROPBEAR_LASTLOG 0'
            echo '#define DROPBEAR_PUTUTLINE 0'
          } > localoptions.h
          ./configure --host=mips-linux-muslsf CC=mips-linux-muslsf-gcc --disable-zlib --disable-syslog
          make PROGRAMS='dropbear dropbearkey' MULTI=1 STATIC=1 -j"$(nproc)"
          mips-linux-muslsf-strip dropbearmulti
          echo "=== verify (want: ELF 32-bit MSB, MIPS32, soft-float, statically linked) ==="
          file dropbearmulti
          mips-linux-muslsf-readelf -h dropbearmulti | grep -E 'Class|Data|Machine|Flags'
          mips-linux-muslsf-readelf -A dropbearmulti 2>/dev/null | grep -iE 'fp|float' || true
          ls -la dropbearmulti

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dropbearmulti-mips
          path: dropbear-2022.83/dropbearmulti
          if-no-files-found: error
