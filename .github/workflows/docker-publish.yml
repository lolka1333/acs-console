name: Docker publish

# Build the image and push it to GitHub Container Registry
# (ghcr.io/<owner>/acs-console) on every push to main and on version tags.
on:
  push:
    branches: [main]
    tags: ['v*']

env:
  # run JS actions on Node 24 (Node 20 is deprecated on GitHub runners)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Everything below is the plain docker CLI in `run:` steps — no Docker JS
      # actions, so nothing targets the deprecated Node 20.
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build & push
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"          # GHCR requires lowercase
          tags=(-t "$image:sha-${GITHUB_SHA::7}")
          if [ "$GITHUB_REF_TYPE" = "branch" ] && [ "$GITHUB_REF_NAME" = "main" ]; then
            tags+=(-t "$image:latest")
          fi
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            tags+=(-t "$image:$version" -t "$image:latest")
          fi
          echo "Building: ${tags[*]}"
          docker build "${tags[@]}" .
          docker push --all-tags "$image"
